services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cve-postgres
    environment:
      POSTGRES_USER: cve
      POSTGRES_PASSWORD: cve
      POSTGRES_DB: cvedb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # These run in name order on first boot:
      - ./schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./01_pgvector.sql:/docker-entrypoint-initdb.d/01_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cve -d cvedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: